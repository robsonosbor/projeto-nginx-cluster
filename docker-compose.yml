version: '3.8'

services:
  # ============================================================================
  # NGINX - Load Balancer
  # ============================================================================
  nginx:
    build:
      context: .
      dockerfile: dockerfile
    container_name: nginx-lb
    ports:
      - "4500:4500"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - php-fpm-1
      - php-fpm-2
      - php-fpm-3
    networks:
      - cluster_network
    environment:
      - TZ=America/Sao_Paulo
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4500/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ============================================================================
  # PHP-FPM - Backend 1
  # ============================================================================
  php-fpm-1:
    image: php:8.2-fpm-alpine
    container_name: php-fpm-1
    volumes:
      - ./app:/var/www/html:rw
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-Senha123}
      - DB_NAME=${DB_NAME:-meubanco}
      - TZ=America/Sao_Paulo
    networks:
      - cluster_network
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # PHP-FPM - Backend 2
  # ============================================================================
  php-fpm-2:
    image: php:8.2-fpm-alpine
    container_name: php-fpm-2
    volumes:
      - ./app:/var/www/html:rw
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-Senha123}
      - DB_NAME=${DB_NAME:-meubanco}
      - TZ=America/Sao_Paulo
    networks:
      - cluster_network
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # PHP-FPM - Backend 3
  # ============================================================================
  php-fpm-3:
    image: php:8.2-fpm-alpine
    container_name: php-fpm-3
    volumes:
      - ./app:/var/www/html:rw
    environment:
      - DB_HOST=mysql
      - DB_USER=${DB_USER:-root}
      - DB_PASS=${DB_PASS:-Senha123}
      - DB_NAME=${DB_NAME:-meubanco}
      - TZ=America/Sao_Paulo
    networks:
      - cluster_network
    depends_on:
      - mysql
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================================
  # MySQL - Database
  # ============================================================================
  mysql:
    image: mysql:8.0-alpine
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-Senha123}
      MYSQL_DATABASE: ${DB_NAME:-meubanco}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASS:-Senha123}
      TZ: America/Sao_Paulo
    ports:
      - "3306:3306"
    volumes:
      - ./banco.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
      - mysql_data:/var/lib/mysql
    networks:
      - cluster_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  mysql_data:
    driver: local
  nginx_logs:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  cluster_network:
    driver: bridge
