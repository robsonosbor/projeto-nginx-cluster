# Nginx Load Balancer Configuration - Production Ready
# Autor: [Seu Nome]
# Data: Março 2026

# ============================================================================
# CONTEXT PRINCIPAL
# ============================================================================

# Executar Nginx como usuário www-data
user nginx;

# Número de processos worker (auto = CPU cores)
worker_processes auto;

# Arquivo PID
pid /var/run/nginx.pid;

# Limite de arquivos abertos por processo
worker_rlimit_nofile 65535;

# ============================================================================
# LOGGING
# ============================================================================

# Log de erros
error_log /var/log/nginx/error.log warn;

# Formato customizado de log de acesso
log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent "$http_referer" '
                '"$http_user_agent" "$http_x_forwarded_for" '
                'rt=$request_time uct="$upstream_connect_time" '
                'uht="$upstream_header_time" urt="$upstream_response_time"';

log_format json_combined escape=json
'{'
  '"time_local":"$time_local",'
  '"remote_addr":"$remote_addr",'
  '"request":"$request",'
  '"status":$status,'
  '"bytes_sent":$bytes_sent,'
  '"request_time":$request_time,'
  '"upstream_addr":"$upstream_addr",'
  '"upstream_status":"$upstream_status",'
  '"upstream_response_time":"$upstream_response_time"'
'}';

# ============================================================================
# EVENTOS
# ============================================================================

events {
    # Método de processamento de conexões
    use epoll;
    
    # Número máximo de conexões por worker
    worker_connections 4096;
    
    # Aceitar múltiplas conexões de uma vez
    multi_accept on;
}

# ============================================================================
# CONTEXT HTTP
# ============================================================================

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================================================
    # LOGGING HTTP
    # ========================================================================
    
    access_log /var/log/nginx/access.log main buffer=32k;
    
    # Desabilitar logging para requisições de health check
    map $request_uri $loggable {
        "~^/health" 0;
        default 1;
    }
    access_log /var/log/nginx/access.log main if=$loggable;

    # ========================================================================
    # PERFORMANCE - BUFFER E TIMEOUTS
    # ========================================================================
    
    # Buffering
    client_body_buffer_size 16K;
    client_max_body_size 2m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # Upstream timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # ========================================================================
    # COMPRESSÃO
    # ========================================================================
    
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;
    gzip_disable "msie6";
    gzip_min_length 1000;

    # ========================================================================
    # SEGURANÇA - HEADERS
    # ========================================================================
    
    # Ocultar versão do Nginx
    server_tokens off;
    
    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

    # ========================================================================
    # OTIMIZAÇÕES GERAIS
    # ========================================================================
    
    # TCP optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # Keepalive
    keepalive_requests 100;
    
    # Open file cache
    open_file_cache max=200000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ========================================================================
    # UPSTREAM SERVERS (LOAD BALANCING)
    # ========================================================================
    
    # PHP-FPM Upstream
    upstream php_fpm {
        least_conn;
        server php-fpm-1:9000 max_fails=3 fail_timeout=30s;
        server php-fpm-2:9000 max_fails=3 fail_timeout=30s;
        server php-fpm-3:9000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Backend HTTP Servers (Opcional - para outros serviços)
    upstream backend_cluster {
        least_conn;
        server 172.31.0.37:80 max_fails=3 fail_timeout=30s;
        server 172.31.0.151:80 max_fails=3 fail_timeout=30s;
        server 172.31.0.149:80 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ========================================================================
    # VIRTUAL SERVER
    # ========================================================================
    
    server {
        # Listen
        listen 4500 default_server;
        listen [::]:4500 default_server;
        
        # Server name
        server_name _;
        
        # Charset
        charset utf-8;

        # ====================================================================
        # LOGGING DO SERVER
        # ====================================================================
        
        access_log /var/log/nginx/lb_access.log main;
        error_log /var/log/nginx/lb_error.log warn;

        # ====================================================================
        # HEALTH CHECK ENDPOINT
        # ====================================================================
        
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ====================================================================
        # MÉTRICAS (Opcional)
        # ====================================================================
        
        location /metrics {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }

        # ====================================================================
        # PROXY PARA BACKEND
        # ====================================================================
        
        # Processar arquivos PHP
        location ~ \.php$ {
            # FastCGI
            fastcgi_pass php_fpm;
            fastcgi_index index.php;
            
            # Headers FastCGI
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            include fastcgi_params;
            
            # Buffering
            fastcgi_buffering on;
            fastcgi_buffer_size 4k;
            fastcgi_buffers 8 4k;
            
            # Timeouts
            fastcgi_connect_timeout 60s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
        }

        # Servir arquivos estáticos
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Root location - redirecionar para index.php
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # ====================================================================
        # BLOQUEIO DE ACESSOS DIRETOS
        # ====================================================================
        
        # Bloqueie requisições sem Host válido
        if ($host !~* ^(localhost|127.0.0.1|[0-9.]+)$) {
            return 444;
        }
    }

    # ========================================================================
    # TRATAMENTO DE ERROS
    # ========================================================================
    
    # Erro 502/503 customizado
    error_page 502 503 @maintenance;
    location @maintenance {
        return 503;
    }
}
